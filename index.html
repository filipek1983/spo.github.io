<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Otwieranie Spotify...</title>
</head>
<body>
  <p>Otwieranie Spotify...</p>
  <script>
    const albumId = "1FHy6omwRDs59igwSLZdvk";
    const fallback = "https://open.spotify.com/album/" + albumId;
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (isIOS) {
      // iOS: Safari obsługuje spotify:// natywnie
      window.location = "spotify:album:" + albumId;
      setTimeout(() => { window.location = fallback; }, 1500);
    } else {
      // Android Chrome: intent://
      var a = document.createElement("a");
      a.href = "intent://album/" + albumId + "#Intent;scheme=spotify;package=com.spotify.music;S.browser_fallback_url=" + encodeURIComponent(fallback) + ";end";
      document.body.appendChild(a);
      a.click();
    }
  </script>
</body>
</html>
