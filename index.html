<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Otwieranie Spotify...</title>
</head>
<body>
  <script>
    // Próbuj otworzyć przez spotify: URI (aplikacja)
    window.location = "spotify:album:1FHy6omwRDs59igwSLZdvk";

    // Fallback po 1.5s → otwórz w przeglądarce
    setTimeout(function() {
      window.location = "https://open.spotify.com/album/1FHy6omwRDs59igwSLZdvk";
    }, 1500);
  </script>
  <p>Otwieranie Spotify...</p>
</body>
</html>
